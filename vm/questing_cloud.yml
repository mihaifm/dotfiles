---
- name: Ubuntu VM modular config
  hosts: ubuntu_vms
  become: true
  gather_facts: true

  vars_files:
    - vault.yml

  vars:
    enable_desktop: true
    enable_xrdp: true
    enable_spice: true
    enable_dev: true
    enable_ai: true
    enable_fonts: true
    enable_sunshine: false
    enable_dcv: false
    enable_vnc: false

    apt_proxy: "" # "http://PROXY:3142"

    desktop_environment: "gnome"
    desktop_variant: "full"

    main_user: ubuntu
    xrdp_user: rubu
    dcv_user: dubu

    marker_dir: "/etc/markers"

    valid_de:
      - gnome
      - kde
      - xfce

    valid_variant:
      - minimal
      - standard
      - full

  pre_tasks:
    - name: Validate desktop environment
      assert:
        that:
          - desktop_environment in valid_de
        fail_msg: "desktop_environment must be one of: {{ valid_de | join(', ') }}"
    - name: Validate desktop variant
      assert:
        that:
          - desktop_variant in valid_variant
        fail_msg: "desktop_variant must be one of: {{ valid_variant | join(', ') }}"

  tasks:

    ##################
    # Network Manager

    - name: Migrate netplan from networkd to NetworkManager
      block:
        - name: Install NetworkManager
          apt:
            name:
              - network-manager
            state: present
            update_cache: true

        - name: Ensure netplan uses NetworkManager renderer
          copy:
            dest: /etc/netplan/01-renderer-networkmanager.yaml
            owner: root
            group: root
            mode: '0600'
            content: |
              network:
                version: 2
                renderer: NetworkManager
          register: nm_renderer

        - name: Generate netplan configuration
          command: netplan generate
          when: nm_renderer.changed

        - name: Apply netplan configuration
          command: netplan apply
          when: nm_renderer.changed

        - name: Ensure NetworkManager is enabled and started
          systemd:
            name: NetworkManager
            enabled: true
            state: restarted
          when: nm_renderer.changed

        - name: Stop/disable/mask systemd-networkd
          systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
            masked: true
          loop:
            - systemd-networkd.service
            - systemd-networkd.socket
            - systemd-networkd-wait-online.service
          ignore_errors: true
          when: nm_renderer.changed

        - name: Wait for host network to come back
          wait_for_connection:
            delay: 3
            timeout: 60
          when: nm_renderer.changed

    #########
    # System

    - name: System tweaks
      block:
        - name: Create main user
          ansible.builtin.user:
            name: "{{ main_user }}"
            password: "{{ ubuntu_main_user_pwd_hash }}"
            password_lock: false
            shell: /bin/bash
            create_home: true

        - name: Create XRDP user
          when: enable_xrdp | bool
          ansible.builtin.user:
            name: "{{ xrdp_user }}"
            password: "{{ ubuntu_xrdp_user_pwd_hash }}"
            shell: /bin/bash
            create_home: true
            groups: sudo
            append: true

        - name: Ensure marker directory exists
          ansible.builtin.file:
            path: "{{ marker_dir }}"
            state: directory
            mode: "0755"

        - name: Ensure virtio_input module is loaded now
          ansible.builtin.modprobe:
            name: virtio_input
            state: present

        - name: Persist virtio_input module across reboots
          ansible.builtin.copy:
            dest: /etc/modules-load.d/virtio-input.conf
            mode: "0644"
            content: "virtio_input\n"

    ######
    # SSH

    - name: SSH authentication
      block:
        - name: Force SSH key and password authentication override
          ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/99-authentication.conf
            owner: root
            group: root
            mode: "0644"
            content: |
              Match all
                PasswordAuthentication yes
                PubkeyAuthentication yes
          register: ssh_auth_config

        - name: Restart SSH service if authentication settings changed
          ansible.builtin.systemd:
            name: ssh
            state: restarted
          when: ssh_auth_config.changed

    ############
    # APT Proxy

    - name: APT Proxy
      block:
        - name: Configure APT proxy if provided
          copy:
            dest: /etc/apt/apt.conf.d/02proxy
            content: |
              Acquire::http::Proxy "{{ apt_proxy }}";
              Acquire::https::Proxy "DIRECT";
              Acquire::http::Timeout "5";
            owner: root
            group: root
            mode: '0644'
          when: apt_proxy | length > 0

        - name: Remove APT proxy config if not set
          file:
            path: /etc/apt/apt.conf.d/02proxy
            state: absent
          when: apt_proxy | length == 0

        - name: Run apt update
          apt:
            update_cache: yes

    ######################
    # Desktop environment

    - name: Desktop Environment
      when: enable_desktop | bool
      block:

        #########
        ## Gnome

        - name: Gnome
          when: desktop_environment == "gnome"
          block:
            - name: Install GNOME minimal
              apt:
                name: ["gnome-core", "gdm3"]
                state: present
              when: desktop_variant == "minimal"

            - name: Install GNOME standard
              apt:
                name: ["gnome", "gdm3"]
                state: present
              when: desktop_variant == "standard"

            - name: Install GNOME full
              apt:
                name: ["ubuntu-desktop"]
                state: present
              when: desktop_variant == "full"

            - name: Customize gnome
              block:
                - name: Ensure per-user GNOME config dir exists
                  ansible.builtin.file:
                    path: "/home/{{ main_user }}/.config"
                    state: directory
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0755"

                - name: Configure default resolution
                  ansible.builtin.copy:
                    dest: "/home/{{ main_user }}/.config/monitors.xml"
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0644"
                    content: |
                      <monitors version="2">
                        <configuration>
                          <layoutmode>logical</layoutmode>
                          <logicalmonitor>
                            <x>0</x>
                            <y>0</y>
                            <scale>1</scale>
                            <primary>yes</primary>
                            <monitor>
                              <monitorspec>
                                <connector>Virtual-1</connector>
                                <vendor>RHT</vendor>
                                <product>QEMU Monitor</product>
                                <serial>0x00000000</serial>
                              </monitorspec>
                              <mode>
                                <width>1920</width>
                                <height>1200</height>
                                <rate>59.885</rate>
                              </mode>
                            </monitor>
                          </logicalmonitor>
                        </configuration>
                      </monitors>

            - name: Start gdm3
              systemd:
                name: gdm3
                enabled: true
                state: started

        #######
        ## KDE

        - name: KDE
          when: desktop_environment == "kde"
          block:
            - name: Install KDE minimal
              apt:
                name: ["plasma-desktop",  "xorg", "plasma-session-x11", "sddm"]
                state: present
              when: desktop_variant == "minimal"

            - name: Install KDE standard
              apt:
                name: ["kde-standard",  "xorg", "plasma-session-x11", "sddm"]
                state: present
              when: desktop_variant == "standard"

            - name: Install KDE full
              apt:
                name: ["kubuntu-desktop", "xorg", "plasma-session-x11"]
                state: present
              when: desktop_variant == "full"

            - name: Customize KDE
              block:
                - name: Ensure per-user KDE config directory exists
                  ansible.builtin.file:
                    path: "/home/{{ item }}/.config"
                    state: directory
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0755"
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

                - name: Enable KDE autolock
                  ansible.builtin.ini_file:
                    path: "/home/{{ item }}/.config/kscreenlockerrc"
                    section: Daemon
                    option: Autolock
                    value: "true"
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0644"
                    no_extra_spaces: true
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

                - name: Set KDE lock timeout to 30 minutes
                  ansible.builtin.ini_file:
                    path: "/home/{{ item }}/.config/kscreenlockerrc"
                    section: Daemon
                    option: Timeout
                    value: "30"
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0644"
                    no_extra_spaces: true
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

            - name: Start sddm
              systemd:
                name: sddm
                enabled: true
                state: started

        ########
        ## XFCE

        - name: XFCE
          when: desktop_environment == "xfce"
          block:
            - name: Install XFCE minimal
              apt:
                name: ["xfce4", "dbus-x11", "lightdm"]
                state: present
              when: desktop_variant == "minimal"

            - name: Install XFCE standard
              apt:
                name: ["xfce4", "xfce4-goodies", "dbus-x11", "lightdm"]
                state: present
              when: desktop_variant == "standard"

            - name: Install XFCE full
              apt:
                name: ["xubuntu-desktop", "dbus-x11"]
                state: present
              when: desktop_variant == "full"

            - name: Customize xfce
              vars:
                xfce_gtk_theme: Arc-Dark
                xfce_icon_theme: Papirus-Dark
              block:
                - name: Install theme and icon packages
                  apt:
                    name: ["arc-theme", "papirus-icon-theme"]
                    state: present

                - name: Ensure per-user xfconf directory exists
                  ansible.builtin.file:
                    path: "/home/{{ item }}/.config/xfce4/xfconf/xfce-perchannel-xml"
                    state: directory
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0755"
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

                - name: Set Xfce theme + icons
                  ansible.builtin.copy:
                    dest: "/home/{{ item }}/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml"
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0644"
                    content: |
                      <?xml version="1.0" encoding="UTF-8"?>

                      <channel name="xsettings" version="1.0">
                      <property name="Net" type="empty">
                      <property name="ThemeName" type="string" value="{{ xfce_gtk_theme }}"/>
                      <property name="IconThemeName" type="string" value="{{ xfce_icon_theme }}"/>
                      </property>
                      </channel>
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

                - name: Set Xfce window manager theme and button layout
                  ansible.builtin.copy:
                    dest: "/home/{{ item }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml"
                    owner: "{{ item }}"
                    group: "{{ item }}"
                    mode: "0644"
                    content: |
                      <?xml version="1.0" encoding="UTF-8"?>

                      <channel name="xfwm4" version="1.0">
                        <property name="general" type="empty">
                          <property name="theme" type="string" value="{{ xfce_gtk_theme }}"/>
                          <property name="button_layout" type="string" value="O|SHMC"/>
                        </property>
                      </channel>
                  loop: "{{ [main_user] + ([xrdp_user] if (enable_xrdp | bool) else []) }}"

            - name: SPICE dynamic resolution
              when: enable_spice | bool
              block:
                - name: Ensure user script dir exists
                  ansible.builtin.file:
                    path: "/home/{{ main_user }}/.local/bin"
                    state: directory
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0755"

                - name: Install XFCE SPICE autoresize script
                  ansible.builtin.copy:
                    dest: "/home/{{ main_user }}/.local/bin/xfce-spice-autoresize.sh"
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0755"
                    content: |
                      #!/usr/bin/env bash
                      set -euo pipefail

                      sleep 2
                      xrandr --output "$(xrandr | awk '/ connected/{print $1; exit; }')" --auto

                      xev -root -event randr 2>/dev/null | \
                      while IFS= read -r line; do
                        case "$line" in
                          *RRScreenChangeNotify*|*XRROutputChangeNotifyEvent*)
                            xrandr --output "$(xrandr | awk '/ connected/{print $1; exit; }')" --auto
                            ;;
                        esac
                      done

                - name: Ensure user autostart dir exists
                  ansible.builtin.file:
                    path: "/home/{{ main_user }}/.config/autostart"
                    state: directory
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0755"

                - name: Install XFCE autostart desktop entry
                  ansible.builtin.copy:
                    dest: "/home/{{ main_user }}/.config/autostart/xfce-spice-autoresize.desktop"
                    owner: "{{ main_user }}"
                    group: "{{ main_user }}"
                    mode: "0644"
                    content: |
                      [Desktop Entry]
                      Type=Application
                      Name=SPICE Auto Resize (XFCE)
                      Exec=/home/{{ main_user }}/.local/bin/xfce-spice-autoresize.sh
                      OnlyShowIn=XFCE;
                      X-GNOME-Autostart-enabled=true
                      Terminal=false
                      Hidden=false

            - name: Start ligthdm
              systemd:
                name: lightdm
                enabled: true
                state: started

    #############
    # App Center

    - name: App Center
      when: enable_desktop | bool
      block:
        - name: Install snap-store
          ansible.builtin.command: snap install snap-store
          args:
            creates: /snap/bin/snap-store

    #######
    # XRDP

    - name: XRDP
      when:
        - enable_desktop | bool
        - enable_xrdp | bool
        - desktop_environment != "gnome"
      block:
        - name: Install XRDP packages
          apt:
            name: ["xrdp", "xorgxrdp"]
            state: present

        - name: Ensure xrdp is enabled and started
          ansible.builtin.service:
            name: xrdp
            enabled: true
            state: started

    ###########
    # TigerVNC

    - name: TigerVNC server setup
      when:
        - enable_desktop | bool
        - enable_vnc | bool
        - desktop_environment in ["xfce", "kde"]
      vars:
        vnc_user: "{{ main_user }}"
        vnc_password: "{{ tigervnc_pass }}"
        vnc_display: ":1"
        vnc_port: 5901
        vnc_geometry: "1920x1080"
      block:
        - name: Install TigerVNC and desktop environment
          apt:
            name:
              - tigervnc-standalone-server
              - tigervnc-common
            state: present

        - name: Create VNC config directory
          file:
            path: "/home/{{ vnc_user }}/.vnc"
            state: directory
            owner: "{{ vnc_user }}"
            group: "{{ vnc_user }}"
            mode: "0755"

        - name: Set VNC password
          shell: |
            echo "{{ vnc_password }}" | vncpasswd -f > /home/{{ vnc_user }}/.vnc/passwd
          args:
            creates: "/home/{{ vnc_user }}/.vnc/passwd"
          become_user: "{{ vnc_user }}"
          no_log: true

        - name: Set VNC password file permissions
          file:
            path: "/home/{{ vnc_user }}/.vnc/passwd"
            owner: "{{ vnc_user }}"
            group: "{{ vnc_user }}"
            mode: "0600"

        - name: Configure TigerVNC server defaults
          copy:
            dest: "/etc/tigervnc/vncserver-config-defaults"
            content: |
              $geometry = "{{ vnc_geometry }}";
              $depth = 24;
              $localhost = "no";
              $SecurityTypes = "VncAuth";
            mode: "0644"

        - name: Configure xstartup
          copy:
            dest: "/home/{{ vnc_user }}/.vnc/xstartup"
            content: |
              #!/bin/sh
              unset SESSION_MANAGER
              unset DBUS_SESSION_BUS_ADDRESS
              {% if desktop_environment == 'xfce' %}
              exec dbus-launch --exit-with-session startxfce4
              {% elif desktop_environment == 'kde' %}
              exec dbus-launch --exit-with-session startplasma-x11
              {% endif %}
            owner: "{{ vnc_user }}"
            group: "{{ vnc_user }}"
            mode: "0755"

        - name: Map user to VNC display
          copy:
            dest: /etc/tigervnc/vncserver.users
            content: |
              {{ vnc_display }}={{ vnc_user }}
            mode: "0644"

        - name: Enable and start TigerVNC systemd service
          systemd:
            name: "tigervncserver@{{ vnc_display }}.service"
            enabled: true
            state: started
            daemon_reload: true

    #######################
    # Gnome Remote Desktop

    - name: Gnome Remote Desktop
      when:
        - enable_desktop | bool
        - desktop_environment == "gnome"
      vars:
        grd_marker: "{{ marker_dir }}/gnome_remote_desktop_installed"

        rdp_username: "{{ gnome_remote_desktop_user}}"
        rdp_password: "{{ gnome_remote_desktop_pass }}"

        grd_tls_dir: "/var/lib/gnome-remote-desktop"
        grd_tls_cert: "/var/lib/gnome-remote-desktop/rdp-tls.crt"
        grd_tls_key: "/var/lib/gnome-remote-desktop/rdp-tls.key"
      block:
        - name: Check if Gnome Remote Desktop already installed
          stat:
            path: "{{ grd_marker }}"
          register: grd_installed

        - name: Install required packages
          when: not grd_installed.stat.exists
          ansible.builtin.apt:
            update_cache: true
            name:
              - gnome-remote-desktop
              - openssl
            state: present

        - name: Ensure TLS directory exists
          when: not grd_installed.stat.exists
          ansible.builtin.file:
            path: "{{ grd_tls_dir }}"
            state: directory
            owner: gnome-remote-desktop
            group: gnome-remote-desktop
            mode: "0750"

        - name: Generate self-signed TLS cert/key for GNOME RDP
          when: not grd_installed.stat.exists
          ansible.builtin.command:
            cmd: >
              openssl req -x509 -newkey rsa:4096
              -keyout {{ grd_tls_key }}
              -out {{ grd_tls_cert }}
              -sha256 -days 3650 -nodes
              -subj "/CN={{ ansible_fqdn | default(ansible_hostname) }}"
          args:
            creates: "{{ grd_tls_cert }}"

        - name: Fix TLS key permissions/ownership
          when: not grd_installed.stat.exists
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: gnome-remote-desktop
            group: gnome-remote-desktop
            mode: "{{ item.mode }}"
          loop:
            - { path: "{{ grd_tls_cert }}", mode: "0644" }
            - { path: "{{ grd_tls_key }}",  mode: "0600" }

        - name: Configure GNOME RDP to use TLS cert
          when: not grd_installed.stat.exists
          ansible.builtin.command: "grdctl --system rdp set-tls-cert {{ grd_tls_cert }}"

        - name: Configure GNOME RDP to use TLS key
          when: not grd_installed.stat.exists
          ansible.builtin.command: "grdctl --system rdp set-tls-key {{ grd_tls_key }}"

        - name: Enable GNOME RDP (system)
          when: not grd_installed.stat.exists
          ansible.builtin.command: "grdctl --system rdp enable"

        - name: Set RDP credentials if missing
          when: not grd_installed.stat.exists
          ansible.builtin.command: "grdctl --system rdp set-credentials {{ rdp_username }} {{ rdp_password }}"

        - name: restart gnome-remote-desktop
          when: not grd_installed.stat.exists
          ansible.builtin.systemd:
            name: gnome-remote-desktop
            enabled: true
            state: restarted

        - name: Create Gnome Remote Desktop install marker
          file:
            path: "{{ grd_marker }}"
            state: touch
          when: not grd_installed.stat.exists

    ########
    # SPICE

    - name: SPICE
      when: enable_spice | bool
      block:
        - name: Install SPICE packages
          apt:
            name: ["spice-vdagent"]
            state: present

        - name: Ensure spice-vdagentd socket is enabled and started
          ansible.builtin.systemd:
            name: spice-vdagentd.socket
            enabled: true
            state: started

        - name: Ensure spice-vdagentd service is enabled and started
          ansible.builtin.systemd:
            name: spice-vdagentd.service
            enabled: true
            state: started

    ###########
    # Sunshine

    - name: Sunshine
      when: enable_sunshine | bool
      vars:
        sunshine_release: "v2026.303.140026"
        sunshine_deb_url: "https://github.com/LizardByte/Sunshine/releases/download/{{ sunshine_release }}/sunshine-debian-trixie-amd64.deb"
        sunshine_deb_path: "/tmp/sunshine-debian-trixie-amd64.deb"
        sunshine_kms: false
      block:
        - name: Download Sunshine package
          ansible.builtin.get_url:
            url: "{{ sunshine_deb_url }}"
            dest: "{{ sunshine_deb_path }}"
            mode: "0644"

        - name: Install Sunshine package dependencies
          ansible.builtin.apt:
            name:
              - miniupnpc
              - libminiupnpc18
            state: present

        - name: Install Sunshine package
          ansible.builtin.apt:
            deb: "{{ sunshine_deb_path }}"

        - name: Generate Sunshine UI credentials
          become: false
          become_user: "{{ main_user }}"
          no_log: true
          ansible.builtin.command: "sunshine --creds {{ sunshine_ui_user }} {{ sunshine_ui_pass }}"
          args:
            creates: "/home/{{ main_user }}/.config/sunshine/sunshine_state.json"

        - name: Ensure Sunshine cursor environment variables are present
          when: sunshine_kms | bool
          ansible.builtin.lineinfile:
            path: /etc/environment
            regexp: "^{{ item.key }}="
            line: "{{ item.key }}={{ item.value }}"
            state: present
          loop:
            - { key: "KWIN_FORCE_SW_CURSOR", value: "1" }
            - { key: "MUTTER_DEBUG_DISABLE_HW_CURSORS", value: "1" }

        - name: Get main user UID
          ansible.builtin.command: "id -u {{ main_user }}"
          register: main_user_uid
          changed_when: false

        - name: Enable sunshine-kms user service
          when: sunshine_kms | bool
          become: false
          become_user: "{{ main_user }}"
          ansible.builtin.command: systemctl --user enable sunshine-kms
          environment:
            XDG_RUNTIME_DIR: "/run/user/{{ main_user_uid.stdout }}"

        - name: Enable sunshine user service
          when: not (sunshine_kms | bool)
          become: false
          become_user: "{{ main_user }}"
          ansible.builtin.command: systemctl --user enable sunshine
          environment:
            XDG_RUNTIME_DIR: "/run/user/{{ main_user_uid.stdout }}"

        - name: Ensure Sunshine autostart directory exists
          ansible.builtin.file:
            path: "/home/{{ main_user }}/.config/autostart"
            state: directory
            owner: "{{ main_user }}"
            group: "{{ main_user }}"
            mode: "0755"

        - name: Install Sunshine desktop autostart entry
          ansible.builtin.copy:
            dest: "/home/{{ main_user }}/.config/autostart/sunshine.desktop"
            owner: "{{ main_user }}"
            group: "{{ main_user }}"
            mode: "0644"
            content: |
              [Desktop Entry]
              Type=Application
              Name=Sunshine
              Exec=/usr/bin/systemctl --user start {{ 'sunshine-kms' if (sunshine_kms | bool) else 'sunshine' }}
              Terminal=false

    #############
    # Amazon DCV

    - name: Amazon DCV
      when:
        - enable_dcv | bool
        - desktop_environment == "xfce"
      vars:
        dcv_server_url: "https://d1uj6qtbmh3dt5.cloudfront.net/2025.0/Servers/nice-dcv-2025.0-20103-ubuntu2404-x86_64.tgz"
        dcv_archive_path: "/tmp/nice-dcv-2025.0-20103-ubuntu2404-x86_64.tgz"
        dcv_extract_dir: "/tmp/nice-dcv-2025.0-20103-ubuntu2404-x86_64"
        dcv_session_marker: "{{ marker_dir }}/dcv_mysession_created"
      block:
        - name: Download Amazon DCV server archive
          ansible.builtin.get_url:
            url: "{{ dcv_server_url }}"
            dest: "{{ dcv_archive_path }}"
            mode: "0644"

        - name: Extract Amazon DCV server archive
          ansible.builtin.unarchive:
            src: "{{ dcv_archive_path }}"
            dest: /tmp
            remote_src: true
            creates: "{{ dcv_extract_dir }}"

        - name: Install Amazon DCV deb packages
          ansible.builtin.shell: "apt-get install -y {{ dcv_extract_dir }}/*.deb"
          args:
            creates: /usr/bin/dcv

        - name: Ensure dcvserver is enabled and started
          ansible.builtin.systemd:
            name: dcvserver
            enabled: true
            state: started

        - name: Create Amazon DCV user
          ansible.builtin.user:
            name: "{{ dcv_user }}"
            password: "{{ ubuntu_dcv_user_pwd_hash }}"
            shell: /bin/bash
            create_home: true
            groups: sudo
            append: true

        - name: Check if Amazon DCV session already exists
          ansible.builtin.stat:
            path: "{{ dcv_session_marker }}"
          register: dcv_session_created

        - name: Create Amazon DCV session
          ansible.builtin.command: "dcv create-session mysession --type virtual --owner {{ dcv_user }}"
          when: not dcv_session_created.stat.exists

        - name: Mark Amazon DCV session as created
          ansible.builtin.file:
            path: "{{ dcv_session_marker }}"
            state: touch
          when: not dcv_session_created.stat.exists

    ####################
    # Development tools

    - name: Dev tools
      when: enable_dev | bool
      vars:
        nvim_install_path: "/opt/nvim/nvim"
        gh_keyring_path: "/etc/apt/keyrings/githubcli-archive-keyring.gpg"
      block:
        - name: Install dev packages
          apt:
            name: [
              "curl", "git", "gnupg", "unzip", "xz-utils", "fuse", "unzip", "fontconfig", "tmux",
              "fzf", "ripgrep", "nodejs", "npm", "firefox", "kitty", "lazygit", "zsh", "ansible"
            ]
            state: present

        - name: Ensure Neovim install dir exists
          ansible.builtin.file:
            path: "/opt/nvim"
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: Download/update Neovim AppImage (latest)
          ansible.builtin.get_url:
            url: "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.appimage"
            dest: "{{ nvim_install_path }}"
            mode: "0755"
          register: nvim_dl

        - name: Symlink nvim into PATH
          ansible.builtin.file:
            src: "{{ nvim_install_path }}"
            dest: "/usr/local/bin/nvim"
            state: link
            force: true

        - name: Install GitHub CLI keyring
          ansible.builtin.get_url:
            url: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
            dest: "{{ gh_keyring_path }}"
            mode: "0644"

        - name: Add GitHub CLI apt repository
          ansible.builtin.apt_repository:
            repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') }} signed-by={{ gh_keyring_path }}] https://cli.github.com/packages stable main"
            filename: "github-cli"
            state: present
            update_cache: true

        - name: Install GitHub CLI
          ansible.builtin.apt:
            name: gh
            state: present

        - name: Install tree-sitter CLI
          ansible.builtin.command: "npm install -g tree-sitter-cli"
          args:
            creates: "/usr/local/bin/tree-sitter"

        - name: Set kitty as default x-terminal-emulator
          ansible.builtin.alternatives:
            name: x-terminal-emulator
            path: /usr/bin/kitty

    ###########
    # AI tools

    - name: AI tools
      when: enable_ai | bool
      block:
        - name: Install/Update OpenAI Codex CLI
          ansible.builtin.command: "npm install -g @openai/codex"
          args:
            creates: "/usr/local/bin/codex"

        - name: Download Claude install script
          get_url:
            url: https://claude.ai/install.sh
            dest: /tmp/claude-install.sh
            mode: '0755'

        - name: Run Claude Code install script
          become: false
          become_user: "{{ main_user }}"
          shell: bash /tmp/claude-install.sh
          args:
            creates: "/home/{{ main_user }}/.local/bin/claude"

        - name: Add ~/.local/bin to PATH in .bashrc
          become: false
          become_user: "{{ main_user }}"
          lineinfile:
            path: "/home/{{ main_user }}/.bashrc"
            line: 'export PATH="$HOME/.local/bin:$PATH"'
            state: present

    #############
    # Nerd Fonts

    - name: Nerd Fonts
      when: enable_fonts | bool
      vars:
        nerd_fonts: ["JetBrainsMono", "FiraCode", "CascadiaCode"]
        nerd_fonts_version: "v3.4.0"
        nerd_fonts_dir: /usr/local/share/fonts/NerdFonts
        nerd_fonts_marker: "{{ marker_dir }}/nerd_fonts_installed"
      block:
        - name: Create Nerd Fonts directory
          file:
            path: "{{ nerd_fonts_dir }}"
            state: directory
            mode: '0755'

        - name: Check if fonts already installed
          stat:
            path: "{{ nerd_fonts_marker }}"
          register: nerd_fonts_installed

        - name: Download Nerd Fonts archives
          get_url:
            url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_fonts_version }}/{{ item }}.zip"
            dest: "/tmp/{{ item }}.zip"
            mode: '0644'
          loop: "{{ nerd_fonts }}"
          when: not nerd_fonts_installed.stat.exists

        - name: Unzip Nerd Fonts
          unarchive:
            src: "/tmp/{{ item }}.zip"
            dest: "{{ nerd_fonts_dir }}"
            remote_src: true
          loop: "{{ nerd_fonts }}"
          when: not nerd_fonts_installed.stat.exists

        - name: Remove downloaded archives
          file:
            path: "/tmp/{{ item }}.zip"
            state: absent
          loop: "{{ nerd_fonts }}"
          when: not nerd_fonts_installed.stat.exists

        - name: Rebuild font cache
          command: fc-cache -f
          when: not nerd_fonts_installed.stat.exists

        - name: Create install marker
          file:
            path: "{{ nerd_fonts_marker }}"
            state: touch
          when: not nerd_fonts_installed.stat.exists
