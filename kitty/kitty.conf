# font
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# colors
background #1e1e1e

# transparency
background_opacity 0.65

# cursor
cursor_shape beam
cursor_blink_interval 0.5

# scrollback
scrollback_lines 10000

# mouse
copy_on_select yes
mouse_hide_wait 3.0

# bell
enable_audio_bell no
visual_bell_duration 0

# window
remember_window_size yes

# tab bar
tab_bar_edge top
tab_bar_background #1a1a1a
tab_bar_style separator
tab_bar_align center
tab_separator " | "
tab_title_template " {index} "
active_tab_font_style normal
active_tab_foreground #ffffff
active_tab_background #1a1a1a
inactive_tab_foreground #666666
inactive_tab_background #1a1a1a

# keyboard shortcuts - remap copy/paste to ctrl+c/ctrl+v
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# disable clipboard popups
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append

# other shortcuts
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
map ctrl+shift+f5 load_config_file
